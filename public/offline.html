<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>오프라인 — 타이브레이커</title>
    <meta name="theme-color" content="#18181b" />
    <style>
      :root {
        color-scheme: light;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
          system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        color: #0a0a0a;
        background: #ffffff;
      }
      .card {
        max-width: 420px;
        width: 100%;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        padding: 28px;
        text-align: center;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #71717a; font-size: 14px; line-height: 1.55; margin: 0 0 16px; }
      button {
        appearance: none;
        border: 1px solid #18181b;
        background: #18181b;
        color: #fafafa;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 14px;
        font-family: inherit;
        cursor: pointer;
      }
      button:hover { background: #27272a; }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 14px;
        background: #18181b;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fafafa;
        font-size: 28px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon" aria-hidden="true">⚡</div>
      <h1>오프라인이에요</h1>
      <p>
        지금은 네트워크에 연결되지 않아 새로 분석하거나 저장할 수 없어요.
        연결이 돌아오면 캐시된 페이지가 자동으로 새로 고쳐져요.
      </p>
      <button type="button" onclick="location.reload()">다시 시도</button>
    </main>
  </body>
</html>
